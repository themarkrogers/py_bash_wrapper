# Local git hook: This local hook runs `make pre-commit (Ruff check/format check and pytest). See docs/code_style.md.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: make-pre-commit
        name: make pre-commit
        entry: make pre-commit
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
