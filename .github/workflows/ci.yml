# Runs when branches are merged to `main` (i.e., when `main` updates). Runs for all supported python versions.
# Process: checkout, install deps, lint, build wheel, smoke-install wheel, run tests. See docs/maintainers.md.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Show uv version
        run: uv --version

      - name: Install dependencies
        run: make install

      - name: Run linter
        run: make lint

      - name: Test building the library
        run: make build

      - name: Check package metadata (twine)
        run: uv run python -m twine check dist/*

      - name: Install built wheel in clean venv
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install dist/*.whl
          .venv-smoke/bin/python -c "import py_bash_wrapper; print(py_bash_wrapper.__version__)"

      - name: Run tests
        run: make run-tests-terminal
