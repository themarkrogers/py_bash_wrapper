name: Tag and release from VERSION

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

concurrency:
  group: release-from-version-main
  cancel-in-progress: false

jobs:
  tag-if-missing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          if [ -z "${VERSION}" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; refusing to create/push tag." >&2
            exit 1
          fi
          if [ -n "$(git ls-remote --tags origin "refs/tags/${TAG}")" ]; then
            echo "Tag ${TAG} already exists on origin; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "Pushed new tag ${TAG}."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Verify tag matches VERSION
        run: python scripts/verify_version_matches_tag.py

      - name: Build artifacts
        run: python -m build

      - name: Create release with generated notes and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          TAG="v${VERSION}"
          gh release create "${TAG}" \
            dist/*.whl \
            dist/*.tar.gz \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes
